version: 1
applications:
  - appRoot: services/my-app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --filter my-app --no-frozen-lockfile
        build:
          commands:
            # Fixes the Out of Memory error during Vite transformation
            - export NODE_OPTIONS="--max-old-space-size=6144"
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            - corepack enable
            - pnpm install --filter my-app --no-frozen-lockfile --child-concurrency=1
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
