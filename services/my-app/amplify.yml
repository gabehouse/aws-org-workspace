version: 1
applications:
  - appRoot: services/my-app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            # Ensure dependencies are installed so ampx can be found
            - corepack enable
            - pnpm install --no-frozen-lockfile
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
