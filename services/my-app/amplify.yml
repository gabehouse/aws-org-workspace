version: 1
applications:
  - appRoot: services/my-app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            # Filter by the exact name from your package.json
            - pnpm install --filter my-app --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            - corepack enable
            # Concurrency=1 saves RAM during the install
            - pnpm install --filter my-app --no-frozen-lockfile --child-concurrency=1
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
