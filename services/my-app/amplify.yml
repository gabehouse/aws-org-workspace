version: 1
applications:
  - appRoot: services/my-app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            # Try filtering by the directory name relative to root
            - pnpm install --filter "./services/my-app" --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    backend:
      phases:
        build:
          commands:
            - corepack enable
            - pnpm install --filter "./services/my-app" --no-frozen-lockfile
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
