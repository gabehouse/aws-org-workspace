version: 1
applications:
  - appRoot: services/my-app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            # Use the package name instead of the path
            - pnpm install --filter my-app --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    backend:
      phases:
        build:
          commands:
            - corepack enable
            # We'll run install in the appRoot specifically to be safe
            - cd $AWS_ ampx_app_root && pnpm install --no-frozen-lockfile
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
