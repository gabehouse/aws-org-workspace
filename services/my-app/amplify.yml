version: 1
applications:
  - appRoot: services/my-app # Update this for each app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    backend:
      phases:
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
