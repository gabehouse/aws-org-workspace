version: 1
applications:
  - appRoot: services/tennis-site
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            # Using the new name 'tennis-site'
            - pnpm install --filter tennis-site --no-frozen-lockfile
        build:
          commands:
            # Memory fix for the Vite build
            - export NODE_OPTIONS="--max-old-space-size=6144"
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    backend:
      phases:
        build:
          commands:
            - corepack enable
            - pnpm install --filter tennis-site --no-frozen-lockfile --child-concurrency=1
            # Memory fix for the CDK synthesis (Google Login logic)
            - export NODE_OPTIONS="--max-old-space-size=6144"
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
