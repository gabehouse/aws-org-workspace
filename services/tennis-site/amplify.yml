version: 1
applications:
  - appRoot: services/tennis-site
    backend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - pnpm install
        build:
          commands:
            # Gen 2 deployment command
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next # Change to 'dist' if you aren't using Next.js
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**
          - node_modules/**
